<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moto Life China</title>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8254181174281884"
     crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- App Styles -->
  <script type="module" crossorigin src="/assets/index-BkWFEhjk.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CnJFVgl1.css">
</head>
<body>

  <!-- ── Fullscreen Background (YouTube iframe) ──────────── -->
  <div id="video-bg">
    <iframe id="cityIframe" src="https://www.youtube-nocookie.com/embed/VIDEO_ID" frameborder="0"
      allow="autoplay; encrypted-media; fullscreen" 
      allowfullscreen
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
      modestbranding="1"
      rel="0"></iframe>
  </div>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <span class="header-icon"><i data-lucide="bike"></i></span>
      <span class="header-title">Moto Life China</span>
    </div>

    <div class="header-right">
      <div class="city-select-wrap">
        <i data-lucide="map-pin" class="select-icon"></i>
        <select id="citySelector" class="city-selector">
          <!-- Populated by JS -->
        </select>
        <i data-lucide="chevron-down" class="select-chevron"></i>
      </div>
      <button id="randomBtn" class="btn-random" title="随机地点 (R)">
        <i data-lucide="shuffle"></i>
      </button>
      <label for="gpxUpload" class="btn-gpx" title="上传GPX轨迹文件">
        <i data-lucide="route"></i>
        <input type="file" id="gpxUpload" accept=".gpx" style="display: none;">
      </label>
      <!-- Language Toggle -->
      <button id="langToggleBtn" class="btn-lang" title="Switch Language">EN</button>
    </div>
  </header>

  <!-- ── Route Info Card (bottom-left) ─────────────────────── -->
  <div id="routeCard" class="route-card">
    <div class="route-city" id="routeCity"></div>
    <div class="route-title" id="routeTitle"></div>
    <div class="route-stats">
      <span id="routeDistance"></span>
      <span id="routeDuration"></span>
    </div>
    <div class="route-note" id="routeNote"></div>
    
    <!-- 实时轨迹信息显示 -->
    <div id="trackInfo" class="track-info" style="display: none;">
      <div class="track-time">
        <span class="metric-label" data-i18n="trackTime">时间</span>
        <span id="currentTime">--</span>
      </div>
      <div class="track-metrics">
        <div class="metric">
          <span class="metric-label" data-i18n="trackAccuracy">精度</span>
          <span id="metricC">--</span>
        </div>
        <div class="metric">
          <span class="metric-label" data-i18n="trackSpeed">速度</span>
          <span id="metricS">-- m/s</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Map Container (bottom-right) ──────────────────────── -->
  <div id="map-container">
    <div id="map"></div>
    <div id="city-label" class="city-label"></div>
  </div>

  <!-- ── Radio Bar ───────────────────────────────────────────── -->
  <div class="radio-bar">
    <div class="radio-bar-inner">

      <div class="radio-info">
        <i data-lucide="radio" class="radio-icon"></i>
        <div class="radio-text">
          <span class="radio-label">Radio</span>
          <span id="stationName" class="radio-station">—</span>
        </div>
        <!-- Waveform visualizer -->
        <div class="waveform" id="waveform">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="radio-controls">
        <button id="radioShuffleBtn" class="btn-control" data-i18n-title="radioShuffleTitle" title="随机切换电台">
          <i data-lucide="shuffle"></i>
        </button>
        <button id="radioPlayBtn" class="btn-control" title="Play / Stop">
          <i data-lucide="play" id="playIcon"></i>
        </button>
      </div>

      <div class="volume-wrap">
        <i data-lucide="volume-2" class="volume-icon"></i>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7" />
      </div>

    </div>
  </div>

  <!-- Hidden audio element for radio -->
  <audio id="radioAudio" preload="none"></audio>

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App Logic -->

</body>
</html>
