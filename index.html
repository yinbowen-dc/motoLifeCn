<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moto Life China</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Fullscreen Background Video ──────────────────────── -->
  <video id="cityVideo" autoplay muted loop playsinline></video>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <span class="header-icon"><i data-lucide="bike"></i></span>
      <span class="header-title">Moto Life China</span>
    </div>

    <div class="city-select-wrap">
      <i data-lucide="map-pin" class="select-icon"></i>
      <select id="citySelector" class="city-selector">
        <!-- Populated by JS -->
      </select>
      <i data-lucide="chevron-down" class="select-chevron"></i>
    </div>
  </header>

  <!-- ── Route Info Card (bottom-left) ─────────────────────── -->
  <div id="routeCard" class="route-card">
    <div class="route-city" id="routeCity"></div>
    <div class="route-title" id="routeTitle"></div>
    <div class="route-stats">
      <span id="routeDistance"></span>
      <span id="routeDuration"></span>
    </div>
    <div class="route-note" id="routeNote"></div>
  </div>

  <!-- ── Map Container (bottom-right) ──────────────────────── -->
  <div id="map-container">
    <div id="map"></div>
    <div id="city-label" class="city-label"></div>
  </div>

  <!-- ── Radio Bar ───────────────────────────────────────────── -->
  <div class="radio-bar">
    <div class="radio-bar-inner">

      <div class="radio-info">
        <i data-lucide="radio" class="radio-icon"></i>
        <div class="radio-text">
          <span class="radio-label">Radio</span>
          <span id="stationName" class="radio-station">—</span>
        </div>
      </div>

      <div class="radio-controls">
        <button id="radioPlayBtn" class="btn-control" title="Play / Stop">
          <i data-lucide="play" id="playIcon"></i>
        </button>
      </div>

      <div class="volume-wrap">
        <i data-lucide="volume-2" class="volume-icon"></i>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7" />
      </div>

    </div>
  </div>

  <!-- Hidden audio element for radio -->
  <audio id="radioAudio" preload="none"></audio>

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
